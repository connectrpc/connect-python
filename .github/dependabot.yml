version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      # Do not prefix commit messages / PR titles, to match the style
      # defined in ./workflows/pr-title.yaml.
      prefix: ""
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      # Do not prefix commit messages / PR titles, to match the style
      # defined in ./workflows/pr-title.yaml.
      prefix: ""
